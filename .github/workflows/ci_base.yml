---
name: CI libs/base
on:
  pull_request:
  paths:
    - 'dev-requirements.txt'
    - 'pip-requirements.txt'
    - 'libs/base/**'
  push:
    branches: main  # Comment this line if you want to test the CI before opening a PR

jobs:
  libs-base-ci:
    uses:
      ./.github/workflows/ci_python_reusable.yml
    with:
      working-directory: libs/base
    secrets: inherit
